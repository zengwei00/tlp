[performance]
DISK_IDLE_SECS_ON_AC=0
DISK_IDLE_SECS_ON_BAT=0
MAX_LOST_WORK_SECS_ON_AC=15
MAX_LOST_WORK_SECS_ON_BAT=15
MAX_DIRTY_RATIO_ON_AC=40
MAX_DIRTY_RATIO_ON_BAT=40
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=performance
CPU_SCALING_GOVERNOR_ON_BAT=performance
CPU_SCALING_GOVERNOR_ON_AC=performance
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="254 254"
#SATA_LINKPWR_ON_AC="max_performance"
#SATA_LINKPWR_ON_BAT="max_performance"
AHCI_RUNTIME_PM_TIMEOUT=15
PCIE_ASPM_ON_AC=performance
PCIE_ASPM_ON_BAT=performance
RADEON_DPM_PERF_LEVEL_ON_AC=auto
RADEON_DPM_PERF_LEVEL_ON_BAT=auto
RADEON_POWER_PROFILE_ON_AC=default
RADEON_POWER_PROFILE_ON_BAT=default
INTEL_GPU_MAX_FREQ_ON_AC=1100
INTEL_GPU_MAX_FREQ_ON_BAT=1100
INTEL_GPU_BOOST_FREQ_ON_AC=1100
INTEL_GPU_BOOST_FREQ_ON_BAT=1100
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=off
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=on
RUNTIME_PM_DRIVER_DENYLIST="mei_me nouveau radeon"

[balance]
DISK_IDLE_SECS_ON_AC=2
DISK_IDLE_SECS_ON_BAT=2
MAX_LOST_WORK_SECS_ON_AC=30
MAX_LOST_WORK_SECS_ON_BAT=30
MAX_DIRTY_RATIO_ON_AC=40
MAX_DIRTY_RATIO_ON_BAT=40
CPU_SCALING_GOVERNOR_ON_BAT=ondemand
CPU_SCALING_GOVERNOR_ON_AC=ondemand
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="254 254"
# SATA_LINKPWR_ON_AC="med_power_with_dipm"
# SATA_LINKPWR_ON_BAT="med_power_with_dipm"
AHCI_RUNTIME_PM_TIMEOUT=15
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=default
RADEON_DPM_PERF_LEVEL_ON_AC=auto
RADEON_DPM_PERF_LEVEL_ON_BAT=auto
RADEON_POWER_PROFILE_ON_AC=default
RADEON_POWER_PROFILE_ON_BAT=default
INTEL_GPU_MAX_FREQ_ON_AC=1100
INTEL_GPU_MAX_FREQ_ON_BAT=1100
INTEL_GPU_BOOST_FREQ_ON_AC=1100
INTEL_GPU_BOOST_FREQ_ON_BAT=1100
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=off
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=on
RUNTIME_PM_DRIVER_DENYLIST="mei_me nouveau radeon"

[saving]
DISK_IDLE_SECS_ON_AC=4
DISK_IDLE_SECS_ON_BAT=4
MAX_LOST_WORK_SECS_ON_AC=600
MAX_LOST_WORK_SECS_ON_BAT=600
MAX_DIRTY_RATIO_ON_AC=60
MAX_DIRTY_RATIO_ON_BAT=60
CPU_ENERGY_PERF_POLICY_ON_AC=balance_power
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave
DISK_APM_LEVEL_ON_AC="128 128"
DISK_APM_LEVEL_ON_BAT="128 128"
# SATA_LINKPWR_ON_AC="med_power_with_dipm"
# SATA_LINKPWR_ON_BAT="med_power_with_dipm"
AHCI_RUNTIME_PM_TIMEOUT=45
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=default
RADEON_DPM_PERF_LEVEL_ON_AC=low
RADEON_DPM_PERF_LEVEL_ON_BAT=low
RADEON_POWER_PROFILE_ON_AC=low
RADEON_POWER_PROFILE_ON_BAT=low
INTEL_GPU_MAX_FREQ_ON_AC=800
INTEL_GPU_MAX_FREQ_ON_BAT=800
INTEL_GPU_BOOST_FREQ_ON_AC=800
INTEL_GPU_BOOST_FREQ_ON_BAT=800
WIFI_PWR_ON_AC=on
WIFI_PWR_ON_BAT=on
#RUNTIME_PM_ON_AC=auto
#RUNTIME_PM_ON_BAT=auto
#RUNTIME_PM_DRIVER_DENYLIST="mei_me nouveau radeon"

[lowbat]
DISK_IDLE_SECS_ON_AC=6
DISK_IDLE_SECS_ON_BAT=6
MAX_LOST_WORK_SECS_ON_AC=600
MAX_LOST_WORK_SECS_ON_BAT=600
MAX_DIRTY_RATIO_ON_AC=60
MAX_DIRTY_RATIO_ON_BAT=60
CPU_ENERGY_PERF_POLICY_ON_AC=power
CPU_ENERGY_PERF_POLICY_ON_BAT=power
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave
DISK_APM_LEVEL_ON_AC="128 128"
DISK_APM_LEVEL_ON_BAT="128 128"
# SATA_LINKPWR_ON_AC="min_power"
# SATA_LINKPWR_ON_BAT="min_power"
AHCI_RUNTIME_PM_TIMEOUT=60
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=default
RADEON_DPM_PERF_LEVEL_ON_AC=low
RADEON_DPM_PERF_LEVEL_ON_BAT=low
RADEON_POWER_PROFILE_ON_AC=low
RADEON_POWER_PROFILE_ON_BAT=low
RADEON_DPM_STATE_ON_AC=battery
RADEON_DPM_STATE_ON_BAT=battery
INTEL_GPU_MAX_FREQ_ON_AC=500
INTEL_GPU_MAX_FREQ_ON_BAT=500
INTEL_GPU_BOOST_FREQ_ON_AC=500
INTEL_GPU_BOOST_FREQ_ON_BAT=500
WIFI_PWR_ON_AC=on
WIFI_PWR_ON_BAT=on
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto
RUNTIME_PM_DRIVER_DENYLIST="mei_me nouveau radeon"